[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"

[tool.coverage.run]
branch = true
source = ["services"]

[tool.coverage.report]
show_missing = true
skip_empty = true

[tool.coverage.json]
output = "coverage.json"
pretty_print = true

[tool.ruff]
target-version = "py313"
line-length = 110
extend-exclude = ["work", "outputs", ".venv"]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I"]
