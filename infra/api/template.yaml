AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Private AWS registry, quarantine, malware gate, processing hooks, and Azure workload federation for the loan document platform.

Parameters:
  EnvironmentName:
    Type: String
    Default: prod
    AllowedPattern: '[a-z0-9-]+'
    MaxLength: 13
  UiHostName:
    Type: String
  EntraTenantId:
    Type: String
    AllowedPattern: '[0-9a-fA-F-]{36}'
  AzureFederationAudience:
    Type: String
    AllowedPattern: 'api://[0-9a-fA-F-]{36}'
    Description: Dedicated Entra Application ID URI accepted only for Azure-to-AWS workload federation.
  AzureFederationSubject:
    Type: String
    AllowedPattern: '[0-9a-fA-F-]{36}'
    Description: Object/principal ID of the Azure API user-assigned managed identity.
  AzureRuntimeRoleMaxSessionSeconds:
    Type: Number
    Default: 3600
    MinValue: 3600
    MaxValue: 43200
  RolePermissionsBoundaryArn:
    Type: String
    AllowedPattern: 'arn:[a-z0-9-]+:iam::[0-9]{12}:policy/[A-Za-z0-9+=,.@_/-]+'
  AlertEmail:
    Type: String
    AllowedPattern: '[^@]+@[^@]+\.[^@]+'
  BudgetEmail:
    Type: String
    AllowedPattern: '[^@]+@[^@]+\.[^@]+'
  MonthlyBudgetUsd:
    Type: Number
    Default: 100
    MinValue: 1
  MaximumUploadBytes:
    Type: Number
    Default: 104857600
    MinValue: 1024
  MaximumPdfPages:
    Type: Number
    Default: 200
    MinValue: 5
  SourceRetentionDays:
    Type: Number
    Default: 2555
    MinValue: 365
  LogRetentionDays:
    Type: Number
    Default: 90
    AllowedValues: [30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1096, 1827, 2192, 2557, 2922, 3288, 3653]
  IdpInputBucketName:
    Type: String
    Default: ''
  IdpWorkingBucketName:
    Type: String
    Default: ''
  IdpOutputBucketName:
    Type: String
    Default: ''
  IdpInputKeyArn:
    Type: String
    Default: ''
  IdpStateMachineArn:
    Type: String
    Default: ''
  ScreenConfigVersion:
    Type: String
    Default: cd-screen-v1
  ScreenConfigSha256:
    Type: String
    Default: 7af2c990538bf15ab1bdf17ef1adf45398b556443a81a41f950086e1513e96dc
    AllowedPattern: '[0-9a-f]{64}'
  FullConfigVersion:
    Type: String
    Default: cd-full-v1
  FullConfigSha256:
    Type: String
    Default: 5eb0bb7d5755701abddc8bea6083bc4d0837423a1a3326d50e1ab0c84d37d57e
    AllowedPattern: '[0-9a-f]{64}'
  SelectorRuleVersion:
    Type: String
    Default: cd-selection-v1
  IdpVersion:
    Type: String
    Default: 0.5.16
  IdpCommit:
    Type: String
    Default: 1463fb6ff91c9e0169a148b33e6bc85d12bab995
    AllowedPattern: '[0-9a-f]{40}'

Conditions:
  HasIdpInputBucket: !Not [!Equals [!Ref IdpInputBucketName, '']]
  HasIdpWorkingBucket: !Not [!Equals [!Ref IdpWorkingBucketName, '']]
  HasIdpOutputBucket: !Not [!Equals [!Ref IdpOutputBucketName, '']]
  HasIdpInputKey: !Not [!Equals [!Ref IdpInputKeyArn, '']]
  HasIdpStateMachine: !Not [!Equals [!Ref IdpStateMachineArn, '']]

Globals:
  Function:
    Runtime: python3.13
    Architectures: [x86_64]
    Tracing: Active
    Environment:
      Variables:
        LOG_LEVEL: INFO
    Tags:
      Application: loan-document-platform
      Environment: !Ref EnvironmentName
      ManagedBy: CloudFormation

Resources:
  DataKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: !Sub 'loan-document-platform ${EnvironmentName} document-data encryption'
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableAccountAdministration
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: AllowCloudWatchLogsEncryption
            Effect: Allow
            Principal:
              Service: !Sub 'logs.${AWS::Region}.${AWS::URLSuffix}'
            Action:
              - kms:Decrypt
              - kms:DescribeKey
              - kms:Encrypt
              - kms:GenerateDataKey
              - kms:ReEncrypt*
            Resource: '*'
            Condition:
              ArnLike:
                kms:EncryptionContext:aws:logs:arn: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:*'
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: DataClassification
          Value: confidential-loan-document

  DataKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/loan-document-${EnvironmentName}-data'
      TargetKeyId: !Ref DataKey

  SourceBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub 'loan-document-${EnvironmentName}-source-${AWS::AccountId}-${AWS::Region}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - BucketKeyEnabled: true
            ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt DataKey.Arn
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - !Sub 'https://${UiHostName}'
            AllowedHeaders: ['*']
            AllowedMethods: [GET, HEAD, POST]
            ExposedHeaders:
              - ETag
              - x-amz-checksum-sha256
              - x-amz-version-id
            MaxAge: 600
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
          - Id: RetireNoncurrentVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: !Ref SourceRetentionDays
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: DataClassification
          Value: confidential-loan-document

  SourceBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SourceBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt SourceBucket.Arn
              - !Sub '${SourceBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

  RegistryTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub 'loan-document-${EnvironmentName}-registry'
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DataKey.Arn
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      TimeToLiveSpecification:
        AttributeName: expiresAtEpoch
        Enabled: true
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: DataClassification
          Value: confidential-loan-metadata

  AlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: !Sub 'Loan document ${EnvironmentName} alerts'
      KmsMasterKeyId: alias/aws/sns
      Subscription:
        - Endpoint: !Ref AlertEmail
          Protocol: email
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName

  UploadProcessorDlq:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName

  PostprocessorDlq:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName

  GuardDutyMalwareRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'loan-document-${EnvironmentName}-guardduty-malware'
      PermissionsBoundary: !Ref RolePermissionsBoundaryArn
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: malware-protection-plan.guardduty.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ScanQuarantinePrefix
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ManageGuardDutyEventRule
                Effect: Allow
                Action:
                  - events:PutRule
                  - events:DeleteRule
                  - events:PutTargets
                  - events:RemoveTargets
                Resource: !Sub 'arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:rule/DO-NOT-DELETE-AmazonGuardDutyMalwareProtectionS3*'
                Condition:
                  StringLike:
                    events:ManagedBy: malware-protection-plan.guardduty.amazonaws.com
              - Sid: MonitorGuardDutyEventRule
                Effect: Allow
                Action:
                  - events:DescribeRule
                  - events:ListTargetsByRule
                Resource: !Sub 'arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:rule/DO-NOT-DELETE-AmazonGuardDutyMalwareProtectionS3*'
              - Sid: ConfigureBucketEvents
                Effect: Allow
                Action:
                  - s3:GetBucketNotification
                  - s3:PutBucketNotification
                  - s3:ListBucket
                Resource: !GetAtt SourceBucket.Arn
              - Sid: ValidateProtectionPlan
                Effect: Allow
                Action: s3:PutObject
                Resource: !Sub '${SourceBucket.Arn}/malware-protection-resource-validation-object'
              - Sid: ScanAndTagQuarantineObjects
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:GetObjectTagging
                  - s3:GetObjectVersionTagging
                  - s3:PutObjectTagging
                  - s3:PutObjectVersionTagging
                Resource: !Sub '${SourceBucket.Arn}/quarantine/*'
              - Sid: UseDataKeyThroughS3
                Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt DataKey.Arn
                Condition:
                  StringLike:
                    kms:ViaService: !Sub 's3.${AWS::Region}.${AWS::URLSuffix}'
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName

  MalwareProtectionPlan:
    Type: AWS::GuardDuty::MalwareProtectionPlan
    Properties:
      Actions:
        Tagging:
          Status: ENABLED
      ProtectedResource:
        S3Bucket:
          BucketName: !Ref SourceBucket
          ObjectPrefixes:
            - quarantine/
      Role: !GetAtt GuardDutyMalwareRole.Arn
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName

  EntraTenantOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: !Sub 'https://sts.windows.net/${EntraTenantId}/'
      ClientIdList:
        - !Ref AzureFederationAudience
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Purpose
          Value: azure-api-runtime-federation

  AzureApiRuntimeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'loan-document-${EnvironmentName}-azure-api'
      PermissionsBoundary: !Ref RolePermissionsBoundaryArn
      Description: Exact-subject runtime role assumed only by the Azure API managed identity.
      MaxSessionDuration: !Ref AzureRuntimeRoleMaxSessionSeconds
      AssumeRolePolicyDocument: !Sub |
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Principal": {
                "Federated": "${EntraTenantOidcProvider}"
              },
              "Action": "sts:AssumeRoleWithWebIdentity",
              "Condition": {
                "StringEquals": {
                  "sts.windows.net/${EntraTenantId}/:aud": "${AzureFederationAudience}",
                  "sts.windows.net/${EntraTenantId}/:sub": "${AzureFederationSubject}"
                }
              }
            }
          ]
        }
      Policies:
        - PolicyName: AzureApiDataAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: RegistryAccess
                Effect: Allow
                Action:
                  - dynamodb:BatchGetItem
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:TransactWriteItems
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt RegistryTable.Arn
                  - !Sub '${RegistryTable.Arn}/index/*'
              - Sid: ExactTenantObjects
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectAttributes
                  - s3:GetObjectVersion
                  - s3:PutObject
                Resource:
                  - !Sub '${SourceBucket.Arn}/quarantine/tenants/*'
                  - !Sub '${SourceBucket.Arn}/tenants/*'
              - Sid: UseDataKeyThroughS3
                Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:Encrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt DataKey.Arn
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub 's3.${AWS::Region}.${AWS::URLSuffix}'
                  StringLike:
                    kms:EncryptionContext:aws:s3:arn:
                      - !Sub '${SourceBucket.Arn}/quarantine/tenants/*'
                      - !Sub '${SourceBucket.Arn}/tenants/*'
              - Sid: ReconcileCompletedUpload
                Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt UploadProcessorFunction.Arn
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName

  UploadProcessorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'loan-document-${EnvironmentName}-upload-processor'
      PermissionsBoundary: !Ref RolePermissionsBoundaryArn
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: ValidateAndStageUploads
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:TransactWriteItems
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt RegistryTable.Arn
                  - !Sub '${RegistryTable.Arn}/index/*'
              - Sid: ReadUploadCompletionStream
                Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListStreams
                Resource: !GetAtt RegistryTable.StreamArn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectAttributes
                  - s3:GetObjectVersion
                Resource: !Sub '${SourceBucket.Arn}/*'
              - !If
                - HasIdpInputBucket
                - Effect: Allow
                  Action:
                    - s3:AbortMultipartUpload
                    - s3:GetObject
                    - s3:GetObjectAttributes
                    - s3:ListBucket
                    - s3:PutObject
                  Resource:
                    - !Sub 'arn:${AWS::Partition}:s3:::${IdpInputBucketName}'
                    - !Sub 'arn:${AWS::Partition}:s3:::${IdpInputBucketName}/*'
                - !Ref AWS::NoValue
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:Encrypt
                  - kms:GenerateDataKey
                Resource:
                  - !GetAtt DataKey.Arn
                  - !If [HasIdpInputKey, !Ref IdpInputKeyArn, !Ref AWS::NoValue]
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt UploadProcessorDlq.Arn
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName

  IdpPostprocessorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'loan-document-${EnvironmentName}-idp-postprocessor'
      PermissionsBoundary: !Ref RolePermissionsBoundaryArn
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: SelectAndMaterializeClosingDisclosure
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:TransactWriteItems
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt RegistryTable.Arn
                  - !Sub '${RegistryTable.Arn}/index/*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectAttributes
                  - s3:GetObjectVersion
                  - s3:PutObject
                Resource: !Sub '${SourceBucket.Arn}/*'
              - !If
                - HasIdpInputBucket
                - Effect: Allow
                  Action:
                    - s3:GetObject
                    - s3:GetObjectAttributes
                    - s3:GetObjectVersion
                    - s3:ListBucket
                    - s3:PutObject
                  Resource:
                    - !Sub 'arn:${AWS::Partition}:s3:::${IdpInputBucketName}'
                    - !Sub 'arn:${AWS::Partition}:s3:::${IdpInputBucketName}/*'
                - !Ref AWS::NoValue
              - !If
                - HasIdpWorkingBucket
                - Effect: Allow
                  Action:
                    - s3:GetObject
                    - s3:GetObjectVersion
                    - s3:ListBucket
                  Resource:
                    - !Sub 'arn:${AWS::Partition}:s3:::${IdpWorkingBucketName}'
                    - !Sub 'arn:${AWS::Partition}:s3:::${IdpWorkingBucketName}/*'
                - !Ref AWS::NoValue
              - !If
                - HasIdpOutputBucket
                - Effect: Allow
                  Action:
                    - s3:GetObject
                    - s3:GetObjectVersion
                    - s3:ListBucket
                  Resource:
                    - !Sub 'arn:${AWS::Partition}:s3:::${IdpOutputBucketName}'
                    - !Sub 'arn:${AWS::Partition}:s3:::${IdpOutputBucketName}/*'
                - !Ref AWS::NoValue
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:Encrypt
                  - kms:GenerateDataKey
                Resource:
                  - !GetAtt DataKey.Arn
                  - !If [HasIdpInputKey, !Ref IdpInputKeyArn, !Ref AWS::NoValue]
              - !If
                - HasIdpStateMachine
                - Effect: Allow
                  Action: states:DescribeExecution
                  Resource: !Sub
                    - 'arn:${AWS::Partition}:states:${AWS::Region}:${AWS::AccountId}:execution:${StateMachineName}:*'
                    - StateMachineName: !Select [6, !Split [':', !Ref IdpStateMachineArn]]
                - !Ref AWS::NoValue
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt PostprocessorDlq.Arn
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName

  UploadProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'loan-document-${EnvironmentName}-upload-processor'
      CodeUri: ../../services/upload_processor
      Handler: app.handler
      Role: !GetAtt UploadProcessorRole.Arn
      MemorySize: 2048
      EphemeralStorage:
        Size: 4096
      Timeout: 300
      ReservedConcurrentExecutions: 10
      Environment:
        Variables:
          TABLE_NAME: !Ref RegistryTable
          SOURCE_BUCKET: !Ref SourceBucket
          DATA_KEY_ARN: !GetAtt DataKey.Arn
          IDP_INPUT_BUCKET: !Ref IdpInputBucketName
          IDP_INPUT_KEY_ARN: !If [HasIdpInputKey, !Ref IdpInputKeyArn, !GetAtt DataKey.Arn]
          SCREEN_CONFIG_VERSION: !Ref ScreenConfigVersion
          SCREEN_CONFIG_SHA256: !Ref ScreenConfigSha256
          SELECTOR_RULE_VERSION: !Ref SelectorRuleVersion
          MAXIMUM_UPLOAD_BYTES: !Ref MaximumUploadBytes
          MAXIMUM_PDF_PAGES: !Ref MaximumPdfPages

  UploadCompletionStreamMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      BatchSize: 10
      BisectBatchOnFunctionError: true
      DestinationConfig:
        OnFailure:
          Destination: !GetAtt UploadProcessorDlq.Arn
      Enabled: true
      EventSourceArn: !GetAtt RegistryTable.StreamArn
      FilterCriteria:
        Filters:
          - Pattern: '{"eventName":["INSERT","MODIFY"],"dynamodb":{"NewImage":{"entityType":{"S":["UPLOAD"]},"status":{"S":["VALIDATING"]}}}}}'
      FunctionName: !Ref UploadProcessorFunction
      FunctionResponseTypes:
        - ReportBatchItemFailures
      MaximumRecordAgeInSeconds: 3600
      MaximumRetryAttempts: 5
      ParallelizationFactor: 1
      StartingPosition: TRIM_HORIZON

  IdpPostprocessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'loan-document-${EnvironmentName}-idp-postprocessor'
      CodeUri: ../../services/idp_postprocessor
      Handler: app.handler
      Role: !GetAtt IdpPostprocessorRole.Arn
      MemorySize: 2048
      EphemeralStorage:
        Size: 4096
      Timeout: 300
      ReservedConcurrentExecutions: 10
      Environment:
        Variables:
          TABLE_NAME: !Ref RegistryTable
          SOURCE_BUCKET: !Ref SourceBucket
          DATA_KEY_ARN: !GetAtt DataKey.Arn
          IDP_INPUT_BUCKET: !Ref IdpInputBucketName
          IDP_INPUT_KEY_ARN: !If [HasIdpInputKey, !Ref IdpInputKeyArn, !GetAtt DataKey.Arn]
          IDP_WORKING_BUCKET: !Ref IdpWorkingBucketName
          IDP_OUTPUT_BUCKET: !Ref IdpOutputBucketName
          SCREEN_CONFIG_VERSION: !Ref ScreenConfigVersion
          SCREEN_CONFIG_SHA256: !Ref ScreenConfigSha256
          FULL_CONFIG_VERSION: !Ref FullConfigVersion
          FULL_CONFIG_SHA256: !Ref FullConfigSha256
          SELECTOR_RULE_VERSION: !Ref SelectorRuleVersion
          IDP_VERSION: !Ref IdpVersion
          IDP_COMMIT: !Ref IdpCommit
          MAXIMUM_PDF_PAGES: !Ref MaximumPdfPages
          IDP_STATE_MACHINE_ARNS: !Ref IdpStateMachineArn
          ACTIVE_EXECUTION_INDEX_NAME: GSI2
          WATCHDOG_MAX_ITEMS: '50'
          WATCHDOG_MIN_AGE_SECONDS: '300'

  UploadProcessorAsyncConfig:
    Type: AWS::Lambda::EventInvokeConfig
    Properties:
      FunctionName: !Ref UploadProcessorFunction
      Qualifier: '$LATEST'
      MaximumEventAgeInSeconds: 3600
      MaximumRetryAttempts: 2
      DestinationConfig:
        OnFailure:
          Destination: !GetAtt UploadProcessorDlq.Arn

  PostprocessorAsyncConfig:
    Type: AWS::Lambda::EventInvokeConfig
    Properties:
      FunctionName: !Ref IdpPostprocessorFunction
      Qualifier: '$LATEST'
      MaximumEventAgeInSeconds: 21600
      MaximumRetryAttempts: 2
      DestinationConfig:
        OnFailure:
          Destination: !GetAtt PostprocessorDlq.Arn

  GuardDutyScanResultRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Route exact GuardDuty S3 malware scan results to the upload processor.
      EventPattern:
        source:
          - aws.guardduty
        detail-type:
          - GuardDuty Malware Protection Object Scan Result
        detail:
          s3ObjectDetails:
            bucketName:
              - !Ref SourceBucket
            objectKey:
              - prefix: quarantine/tenants/
      State: ENABLED
      Targets:
        - Arn: !GetAtt UploadProcessorFunction.Arn
          Id: UploadProcessor
          DeadLetterConfig:
            Arn: !GetAtt UploadProcessorDlq.Arn
          RetryPolicy:
            MaximumEventAgeInSeconds: 3600
            MaximumRetryAttempts: 10

  GuardDutyRuleInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref UploadProcessorFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt GuardDutyScanResultRule.Arn

  IdpFailureRule:
    Type: AWS::Events::Rule
    Condition: HasIdpStateMachine
    Properties:
      Description: Route IDP execution lifecycle events to the postprocessor for active tracking and reconciliation.
      EventPattern:
        source:
          - aws.states
        detail-type:
          - Step Functions Execution Status Change
        detail:
          stateMachineArn:
            - !Ref IdpStateMachineArn
          status:
            - RUNNING
            - SUCCEEDED
            - FAILED
            - TIMED_OUT
            - ABORTED
      State: ENABLED
      Targets:
        - Arn: !GetAtt IdpPostprocessorFunction.Arn
          Id: IdpPostprocessor
          DeadLetterConfig:
            Arn: !GetAtt PostprocessorDlq.Arn
          RetryPolicy:
            MaximumEventAgeInSeconds: 21600
            MaximumRetryAttempts: 10

  IdpFailureRuleInvokePermission:
    Type: AWS::Lambda::Permission
    Condition: HasIdpStateMachine
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref IdpPostprocessorFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt IdpFailureRule.Arn

  IdpExecutionWatchdogRule:
    Type: AWS::Events::Rule
    Condition: HasIdpStateMachine
    Properties:
      Description: Reconcile bounded stale IDP executions when a terminal service event was missed.
      ScheduleExpression: rate(5 minutes)
      State: ENABLED
      Targets:
        - Arn: !GetAtt IdpPostprocessorFunction.Arn
          Id: IdpExecutionWatchdog
          Input: '{"source":"loan-document-platform.watchdog","detail-type":"IDP Execution Watchdog","detail":{}}'
          DeadLetterConfig:
            Arn: !GetAtt PostprocessorDlq.Arn
          RetryPolicy:
            MaximumEventAgeInSeconds: 900
            MaximumRetryAttempts: 2

  IdpExecutionWatchdogInvokePermission:
    Type: AWS::Lambda::Permission
    Condition: HasIdpStateMachine
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref IdpPostprocessorFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt IdpExecutionWatchdogRule.Arn

  UploadProcessorDlqPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref UploadProcessorDlq
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt UploadProcessorDlq.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt GuardDutyScanResultRule.Arn

  PostprocessorDlqPolicy:
    Type: AWS::SQS::QueuePolicy
    Condition: HasIdpStateMachine
    Properties:
      Queues:
        - !Ref PostprocessorDlq
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt PostprocessorDlq.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt IdpFailureRule.Arn
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt PostprocessorDlq.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt IdpExecutionWatchdogRule.Arn

  UploadProcessorLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub '/aws/lambda/${UploadProcessorFunction}'
      RetentionInDays: !Ref LogRetentionDays
      KmsKeyId: !GetAtt DataKey.Arn

  IdpPostprocessorLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub '/aws/lambda/${IdpPostprocessorFunction}'
      RetentionInDays: !Ref LogRetentionDays
      KmsKeyId: !GetAtt DataKey.Arn

  BackupRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'loan-document-${EnvironmentName}-backup'
      PermissionsBoundary: !Ref RolePermissionsBoundaryArn
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForBackup
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName

  BackupVault:
    Type: AWS::Backup::BackupVault
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BackupVaultName: !Sub 'loan-document-${EnvironmentName}'
      EncryptionKeyArn: !GetAtt DataKey.Arn
      BackupVaultTags:
        Application: loan-document-platform
        Environment: !Ref EnvironmentName

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Properties:
      BackupPlan:
        BackupPlanName: !Sub 'loan-document-${EnvironmentName}'
        BackupPlanRule:
          - RuleName: daily-35-days
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: cron(0 9 ? * * *)
            StartWindowMinutes: 60
            CompletionWindowMinutes: 360
            Lifecycle:
              DeleteAfterDays: 35
          - RuleName: monthly-seven-years
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: cron(0 10 1 * ? *)
            StartWindowMinutes: 60
            CompletionWindowMinutes: 720
            Lifecycle:
              DeleteAfterDays: !Ref SourceRetentionDays
      BackupPlanTags:
        Application: loan-document-platform
        Environment: !Ref EnvironmentName

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Properties:
      BackupPlanId: !Ref BackupPlan
      BackupSelection:
        SelectionName: registry-table
        IamRoleArn: !GetAtt BackupRole.Arn
        Resources:
          - !GetAtt RegistryTable.Arn

  MonthlyCostBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetLimit:
          Amount: !Ref MonthlyBudgetUsd
          Unit: USD
        BudgetName: !Sub 'loan-document-${EnvironmentName}-monthly'
        BudgetType: COST
        TimeUnit: MONTHLY
      NotificationsWithSubscribers:
        - Notification:
            ComparisonOperator: GREATER_THAN
            NotificationType: FORECASTED
            Threshold: 80
            ThresholdType: PERCENTAGE
          Subscribers:
            - Address: !Ref BudgetEmail
              SubscriptionType: EMAIL
        - Notification:
            ComparisonOperator: GREATER_THAN
            NotificationType: ACTUAL
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - Address: !Ref BudgetEmail
              SubscriptionType: EMAIL

  ProcessorErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Upload processor or IDP postprocessor errors.
      Metrics:
        - Id: uploadErrors
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Errors
              Dimensions:
                - Name: FunctionName
                  Value: !Ref UploadProcessorFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: postErrors
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Errors
              Dimensions:
                - Name: FunctionName
                  Value: !Ref IdpPostprocessorFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: totalErrors
          Expression: uploadErrors + postErrors
          Label: Processor errors
          ReturnData: true
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]
      OKActions: [!Ref AlertsTopic]

  RegistryThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: DynamoDB throttled requests.
      Namespace: AWS/DynamoDB
      MetricName: ThrottledRequests
      Dimensions:
        - Name: TableName
          Value: !Ref RegistryTable
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]
      OKActions: [!Ref AlertsTopic]

  UploadDlqAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Upload processor dead-letter queue contains messages.
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt UploadProcessorDlq.QueueName
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]
      OKActions: [!Ref AlertsTopic]

  PostprocessorDlqAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: IDP postprocessor dead-letter queue contains messages.
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt PostprocessorDlq.QueueName
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]
      OKActions: [!Ref AlertsTopic]

Outputs:
  SourceBucketName:
    Value: !Ref SourceBucket
  DataKeyArn:
    Value: !GetAtt DataKey.Arn
  RegistryTableName:
    Value: !Ref RegistryTable
  RegistryTableArn:
    Value: !GetAtt RegistryTable.Arn
  UploadProcessorFunctionArn:
    Value: !GetAtt UploadProcessorFunction.Arn
  IdpPostprocessorFunctionArn:
    Value: !GetAtt IdpPostprocessorFunction.Arn
  AlertsTopicArn:
    Value: !Ref AlertsTopic
  MalwareProtectionPlanArn:
    Value: !GetAtt MalwareProtectionPlan.Arn
  AzureApiRuntimeRoleArn:
    Value: !GetAtt AzureApiRuntimeRole.Arn
  EntraTenantOidcProviderArn:
    Value: !Ref EntraTenantOidcProvider
