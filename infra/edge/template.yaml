AWSTemplateFormatVersion: '2010-09-09'
Description: Production CloudFront, WAF, certificates, DNS, and private React SPA hosting.

Parameters:
  EnvironmentName:
    Type: String
    Default: prod
    AllowedPattern: '[a-z0-9-]+'
  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
  UiHostName:
    Type: String
  ApiHostName:
    Type: String
  ApiOriginHostName:
    Type: String
  GitHubDeploymentRoleArn:
    Type: String
    Description: Bootstrap GitHub OIDC role allowed to assume the narrowly scoped UI publication role.
  OriginVerifySecret:
    Type: String
    NoEcho: true
    MinLength: 32
    MaxLength: 256
  OriginVerifySecretDigest:
    Type: String
    AllowedPattern: '[0-9a-f]{64}'
  AlertEmail:
    Type: String
    AllowedPattern: '[^@]+@[^@]+\.[^@]+'
  LogRetentionDays:
    Type: Number
    Default: 365
    MinValue: 30
  ApiRateLimit:
    Type: Number
    Default: 2000
    MinValue: 100
  CloudFrontPriceClass:
    Type: String
    Default: PriceClass_100
    AllowedValues: [PriceClass_100, PriceClass_200, PriceClass_All]

Resources:
  EdgeAlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: !Sub 'Loan document ${EnvironmentName} edge alerts'
      KmsMasterKeyId: alias/aws/sns
      Subscription:
        - Endpoint: !Ref AlertEmail
          Protocol: email
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName

  UiBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
          - Id: RetireOldDeployments
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: DataClassification
          Value: public-application-assets

  AccessLogBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Metadata:
      cfn-lint:
        config:
          # CloudFront standard logging v1 requires an ACL-enabled destination.
          ignore_checks:
            - W3045
    Properties:
      AccessControl: LogDeliveryWrite
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: RetainAccessLogs
            Status: Enabled
            ExpirationInDays: !Ref LogRetentionDays
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: DataClassification
          Value: security-log

  AccessLogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AccessLogBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt AccessLogBucket.Arn
              - !Sub '${AccessLogBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

  UiCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref UiHostName
      DomainValidationOptions:
        - DomainName: !Ref UiHostName
          HostedZoneId: !Ref HostedZoneId
      ValidationMethod: DNS
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Purpose
          Value: ui-cloudfront-tls

  ApiCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref ApiHostName
      DomainValidationOptions:
        - DomainName: !Ref ApiHostName
          HostedZoneId: !Ref HostedZoneId
      ValidationMethod: DNS
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Purpose
          Value: api-cloudfront-tls

  UiOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Description: !Sub 'Private loan UI ${EnvironmentName} S3 origin'
        Name: !Sub 'loan-document-${EnvironmentName}-ui'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  SecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub 'loan-document-${EnvironmentName}-security'
        Comment: Strict browser security headers for the Entra-authenticated SPA.
        SecurityHeadersConfig:
          ContentSecurityPolicy:
            ContentSecurityPolicy: !Sub >-
              default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none';
              script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;
              font-src 'self' data:; worker-src 'self' blob:;
              connect-src 'self' https://${ApiHostName} https://login.microsoftonline.com https://*.microsoftonline.com https://*.msauth.net https://*.msftauth.net https://*.amazonaws.com;
              frame-src https://login.microsoftonline.com https://*.microsoftonline.com;
              form-action 'self' https://login.microsoftonline.com; upgrade-insecure-requests
            Override: true
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: no-referrer
            Override: true
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 63072000
            IncludeSubdomains: false
            Preload: false
            Override: true
        CustomHeadersConfig:
          Items:
            - Header: Permissions-Policy
              Value: 'camera=(), microphone=(), geolocation=(), payment=(), usb=()'
              Override: true
            - Header: Cache-Control
              Value: no-store
              Override: false

  EdgeWebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub 'loan-document-${EnvironmentName}'
      Description: Managed protections and per-IP API rate limiting for both CloudFront distributions.
      Scope: CLOUDFRONT
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        CloudWatchMetricsEnabled: true
        MetricName: !Sub 'loan-document-${EnvironmentName}'
        SampledRequestsEnabled: true
      Rules:
        - Name: AWSManagedCommon
          Priority: 10
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: common
            SampledRequestsEnabled: true
        - Name: AWSManagedKnownBadInputs
          Priority: 20
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: known-bad-inputs
            SampledRequestsEnabled: true
        - Name: AWSManagedIpReputation
          Priority: 30
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesAmazonIpReputationList
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: ip-reputation
            SampledRequestsEnabled: true
        - Name: ApiPerIpRateLimit
          Priority: 40
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              AggregateKeyType: IP
              Limit: !Ref ApiRateLimit
              ScopeDownStatement:
                OrStatement:
                  Statements:
                    - ByteMatchStatement:
                        FieldToMatch:
                          UriPath: {}
                        PositionalConstraint: STARTS_WITH
                        SearchString: /v1/
                        TextTransformations:
                          - Priority: 0
                            Type: NONE
                    - ByteMatchStatement:
                        FieldToMatch:
                          UriPath: {}
                        PositionalConstraint: EXACTLY
                        SearchString: /health
                        TextTransformations:
                          - Priority: 0
                            Type: NONE
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: api-rate-limit
            SampledRequestsEnabled: true
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName

  UiDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Aliases:
          - !Ref UiHostName
        Comment: !Sub 'Loan document React UI (${EnvironmentName})'
        CustomErrorResponses:
          - ErrorCode: 403
            ErrorCachingMinTTL: 0
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ErrorCachingMinTTL: 0
            ResponseCode: 200
            ResponsePagePath: /index.html
        DefaultCacheBehavior:
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD, OPTIONS]
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
          TargetOriginId: ui-s3
          ViewerProtocolPolicy: redirect-to-https
        DefaultRootObject: index.html
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        Logging:
          Bucket: !GetAtt AccessLogBucket.DomainName
          IncludeCookies: false
          Prefix: !Sub 'cloudfront/ui/${EnvironmentName}/'
        Origins:
          - DomainName: !GetAtt UiBucket.RegionalDomainName
            Id: ui-s3
            OriginAccessControlId: !Ref UiOriginAccessControl
            S3OriginConfig:
              OriginAccessIdentity: ''
        PriceClass: !Ref CloudFrontPriceClass
        ViewerCertificate:
          AcmCertificateArn: !Ref UiCertificate
          MinimumProtocolVersion: TLSv1.2_2021
          SslSupportMethod: sni-only
        WebACLId: !GetAtt EdgeWebAcl.Arn
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName

  UiBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref UiBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${UiBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${UiDistribution}'
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt UiBucket.Arn
              - !Sub '${UiBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

  ApiDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Aliases:
          - !Ref ApiHostName
        Comment: !Sub 'Loan document public API edge (${EnvironmentName})'
        DefaultCacheBehavior:
          AllowedMethods: [DELETE, GET, HEAD, OPTIONS, PATCH, POST, PUT]
          CachedMethods: [GET, HEAD, OPTIONS]
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          Compress: true
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
          TargetOriginId: regional-api
          ViewerProtocolPolicy: redirect-to-https
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        Logging:
          Bucket: !GetAtt AccessLogBucket.DomainName
          IncludeCookies: false
          Prefix: !Sub 'cloudfront/api/${EnvironmentName}/'
        Origins:
          - CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginKeepaliveTimeout: 5
              OriginProtocolPolicy: https-only
              OriginReadTimeout: 30
              OriginSSLProtocols: [TLSv1.2]
            DomainName: !Ref ApiOriginHostName
            Id: regional-api
            OriginCustomHeaders:
              - HeaderName: X-Origin-Verify
                HeaderValue: !Ref OriginVerifySecret
        PriceClass: !Ref CloudFrontPriceClass
        ViewerCertificate:
          AcmCertificateArn: !Ref ApiCertificate
          MinimumProtocolVersion: TLSv1.2_2021
          SslSupportMethod: sni-only
        WebACLId: !GetAtt EdgeWebAcl.Arn
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName

  UiDeploymentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'loan-document-${EnvironmentName}-ui-deploy'
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref GitHubDeploymentRoleArn
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PublishStaticUiOnly
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:ListBucket
                  - s3:ListBucketVersions
                Resource: !GetAtt UiBucket.Arn
              - Effect: Allow
                Action:
                  - s3:DeleteObject
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub '${UiBucket.Arn}/*'
              - Effect: Allow
                Action: cloudfront:CreateInvalidation
                Resource: !Sub 'arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${UiDistribution}'
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName

  UiIpv4Record:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref UiHostName
      Type: A
      AliasTarget:
        DNSName: !GetAtt UiDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  UiIpv6Record:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref UiHostName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt UiDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  ApiIpv4Record:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref ApiHostName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  ApiIpv6Record:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref ApiHostName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt ApiDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  WafBlockedRequestsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: WAF blocked-request surge at the public edge.
      Namespace: AWS/WAFV2
      MetricName: BlockedRequests
      Dimensions:
        - Name: WebACL
          Value: !Sub 'loan-document-${EnvironmentName}'
        - Name: Rule
          Value: ALL
        - Name: Region
          Value: Global
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      DatapointsToAlarm: 2
      Threshold: 100
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref EdgeAlertsTopic]
      OKActions: [!Ref EdgeAlertsTopic]

  UiCertificateExpiryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: UI certificate expires within 30 days.
      Namespace: AWS/CertificateManager
      MetricName: DaysToExpiry
      Dimensions:
        - Name: CertificateArn
          Value: !Ref UiCertificate
      Statistic: Minimum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 30
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions: [!Ref EdgeAlertsTopic]
      OKActions: [!Ref EdgeAlertsTopic]

  ApiCertificateExpiryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: API edge certificate expires within 30 days.
      Namespace: AWS/CertificateManager
      MetricName: DaysToExpiry
      Dimensions:
        - Name: CertificateArn
          Value: !Ref ApiCertificate
      Statistic: Minimum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 30
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions: [!Ref EdgeAlertsTopic]
      OKActions: [!Ref EdgeAlertsTopic]

Outputs:
  UiUrl:
    Value: !Sub 'https://${UiHostName}'
  ApiUrl:
    Value: !Sub 'https://${ApiHostName}'
  UiBucketName:
    Value: !Ref UiBucket
  UiDistributionId:
    Value: !Ref UiDistribution
  ApiDistributionId:
    Value: !Ref ApiDistribution
  UiDeploymentRoleArn:
    Value: !GetAtt UiDeploymentRole.Arn
  WebAclArn:
    Value: !GetAtt EdgeWebAcl.Arn
  EdgeAlertsTopicArn:
    Value: !Ref EdgeAlertsTopic
  OriginVerifySecretDigest:
    Value: !Ref OriginVerifySecretDigest
    Description: Non-secret digest only; must equal the regional platform stack output.
