AWSTemplateFormatVersion: '2010-09-09'
Description: GitHub Actions OIDC trust, deployment artifact storage, and CloudFormation delivery roles.

Parameters:
  GitHubOwner:
    Type: String
    AllowedPattern: '[A-Za-z0-9_.-]+'
  GitHubRepository:
    Type: String
    AllowedPattern: '[A-Za-z0-9_.-]+'
  GitHubEnvironment:
    Type: String
    Default: prod
    AllowedPattern: '[A-Za-z0-9_.-]+'
  ExistingGitHubOidcProviderArn:
    Type: String
    Default: ''
  EnvironmentName:
    Type: String
    Default: prod
    AllowedPattern: '[a-z0-9-]+'
  PlatformStackName:
    Type: String
    AllowedPattern: '[A-Za-z][-A-Za-z0-9]*'
  IdpStackName:
    Type: String
    AllowedPattern: '[A-Za-z][-A-Za-z0-9]*'
  EntraTenantId:
    Type: String
    AllowedPattern: '[0-9a-fA-F-]{36}'

Conditions:
  CreateGitHubOidcProvider: !Equals [!Ref ExistingGitHubOidcProviderArn, '']

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateGitHubOidcProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: ManagedBy
          Value: CloudFormation

  ArtifactKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: !Sub 'loan-document-platform ${EnvironmentName} CI artifact encryption'
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableAccountAdministration
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName

  ArtifactKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/loan-document-${EnvironmentName}-ci-artifacts'
      TargetKeyId: !Ref ArtifactKey

  ArtifactBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub 'loan-document-${EnvironmentName}-ci-artifacts-${AWS::AccountId}-${AWS::Region}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - BucketKeyEnabled: true
            ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt ArtifactKey.Arn
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
          - Id: RetireOldBuilds
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30
            ExpirationInDays: 90
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: DataClassification
          Value: build-artifacts-no-document-data

  ArtifactBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ArtifactBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt ArtifactBucket.Arn
              - !Sub '${ArtifactBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

  PlatformRolePermissionsBoundary:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub 'loan-document-${EnvironmentName}-platform-boundary'
      Description: Maximum runtime permissions for roles created by the private platform stack.
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PlatformRuntimeServicesOnly
            Effect: Allow
            Action:
              - backup:*
              - dynamodb:*
              - events:*
              - kms:*
              - lambda:InvokeFunction
              - logs:*
              - s3:*
              - sqs:SendMessage
              - states:DescribeExecution
              - tag:GetResources
              - tag:GetTagKeys
              - tag:GetTagValues
              - xray:*
            Resource: '*'

  IdpRolePermissionsBoundary:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub 'loan-document-${EnvironmentName}-idp-boundary'
      Description: Maximum runtime permissions for roles created by the pinned headless IDP stack.
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PinnedIdpRuntimeServicesOnly
            Effect: Allow
            Action:
              - aoss:*
              - application-autoscaling:*
              - athena:*
              - bedrock:*
              - cloudformation:Describe*
              - cloudformation:GetTemplate
              - cloudformation:List*
              - cloudwatch:*
              - codebuild:*
              - dynamodb:*
              - ec2:*
              - ecr:*
              - events:*
              - glue:*
              - kms:*
              - lambda:*
              - logs:*
              - s3:*
              - sagemaker:*
              - scheduler:*
              - secretsmanager:*
              - sns:*
              - sqs:*
              - ssm:*
              - states:*
              - textract:*
              - xray:*
            Resource: '*'

  PlatformCloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'loan-document-${EnvironmentName}-platform-cfn'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PlatformResourceProvisioning
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ExactPlatformResources
                Effect: Allow
                Action:
                  - cloudwatch:DeleteAlarms
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:PutMetricAlarm
                  - cloudwatch:TagResource
                  - cloudwatch:UntagResource
                  - dynamodb:*
                  - events:*
                  - lambda:*
                  - logs:*
                  - s3:*
                  - sns:*
                  - sqs:*
                Resource:
                  - !Sub 'arn:${AWS::Partition}:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${PlatformStackName}-*'
                  - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/loan-document-${EnvironmentName}-registry'
                  - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/loan-document-${EnvironmentName}-registry/*'
                  - !Sub 'arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:rule/${PlatformStackName}-*'
                  - !Sub 'arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:rule/DO-NOT-DELETE-AmazonGuardDutyMalwareProtectionS3*'
                  - !Sub 'arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:loan-document-${EnvironmentName}-*'
                  - !Sub 'arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:event-source-mapping:*'
                  - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/loan-document-${EnvironmentName}-*:*'
                  - !Sub 'arn:${AWS::Partition}:s3:::loan-document-${EnvironmentName}-source-${AWS::AccountId}-${AWS::Region}'
                  - !Sub 'arn:${AWS::Partition}:s3:::loan-document-${EnvironmentName}-source-${AWS::AccountId}-${AWS::Region}/*'
                  - !Sub 'arn:${AWS::Partition}:sns:${AWS::Region}:${AWS::AccountId}:${PlatformStackName}-*'
                  - !Sub 'arn:${AWS::Partition}:sqs:${AWS::Region}:${AWS::AccountId}:${PlatformStackName}-*'
              - Sid: CreateExactEventSourceMapping
                Effect: Allow
                Action: lambda:CreateEventSourceMapping
                Resource: '*'
                Condition:
                  ArnEquals:
                    lambda:FunctionArn: !Sub 'arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:loan-document-${EnvironmentName}-upload-processor'
              - Sid: EventSourceMappingDiscovery
                Effect: Allow
                Action: lambda:ListEventSourceMappings
                Resource: '*'
              - Sid: CreateTaggedDataKey
                Effect: Allow
                Action: kms:CreateKey
                Resource: '*'
                Condition:
                  StringEquals:
                    aws:RequestTag/Application: loan-document-platform
                    aws:RequestTag/Environment: !Ref EnvironmentName
              - Sid: ManageTaggedDataKeys
                Effect: Allow
                Action: kms:*
                Resource: !Sub 'arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:key/*'
                Condition:
                  StringEquals:
                    aws:ResourceTag/Application: loan-document-platform
                    aws:ResourceTag/Environment: !Ref EnvironmentName
              - Sid: ManageExactDataKeyAlias
                Effect: Allow
                Action:
                  - kms:CreateAlias
                  - kms:DeleteAlias
                  - kms:UpdateAlias
                Resource:
                  - !Sub 'arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:alias/loan-document-${EnvironmentName}-data'
                  - !Sub 'arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:key/*'
              - Sid: KmsDiscovery
                Effect: Allow
                Action:
                  - kms:ListAliases
                  - kms:ListKeys
                Resource: '*'
              - Sid: PlatformBackupAndMalwarePlan
                Effect: Allow
                Action:
                  - backup:*
                  - guardduty:*
                Resource: '*'
              - Sid: ExactCostBudget
                Effect: Allow
                Action: budgets:*
                Resource: !Sub 'arn:${AWS::Partition}:budgets::${AWS::AccountId}:budget/loan-document-${EnvironmentName}-monthly'
        - PolicyName: PlatformIamProvisioning
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: CreateBoundaryConstrainedPlatformRoles
                Effect: Allow
                Action: iam:CreateRole
                Resource: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/loan-document-${EnvironmentName}-*'
                Condition:
                  ArnEquals:
                    iam:PermissionsBoundary: !Ref PlatformRolePermissionsBoundary
                  StringEquals:
                    aws:RequestTag/Application: loan-document-platform
                    aws:RequestTag/Environment: !Ref EnvironmentName
              - Sid: ManagePlatformRoles
                Effect: Allow
                Action:
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:ListAttachedRolePolicies
                  - iam:ListRolePolicies
                  - iam:PutRolePolicy
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:UpdateAssumeRolePolicy
                  - iam:UpdateRole
                  - iam:UpdateRoleDescription
                Resource: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/loan-document-${EnvironmentName}-*'
              - Sid: ApplyPlatformBoundary
                Effect: Allow
                Action: iam:PutRolePermissionsBoundary
                Resource: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/loan-document-${EnvironmentName}-*'
                Condition:
                  ArnEquals:
                    iam:PermissionsBoundary: !Ref PlatformRolePermissionsBoundary
              - Sid: DenyPlatformBoundaryRemoval
                Effect: Deny
                Action: iam:DeleteRolePermissionsBoundary
                Resource: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/loan-document-${EnvironmentName}-*'
              - Sid: AttachApprovedPlatformManagedPolicies
                Effect: Allow
                Action:
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                Resource: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/loan-document-${EnvironmentName}-*'
                Condition:
                  ArnEquals:
                    iam:PolicyARN:
                      - !Sub 'arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
                      - !Sub 'arn:${AWS::Partition}:iam::aws:policy/AWSXRayDaemonWriteAccess'
                      - !Sub 'arn:${AWS::Partition}:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForBackup'
              - Sid: PassPlatformRolesToApprovedServices
                Effect: Allow
                Action: iam:PassRole
                Resource: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/loan-document-${EnvironmentName}-*'
                Condition:
                  StringEquals:
                    iam:PassedToService:
                      - backup.amazonaws.com
                      - lambda.amazonaws.com
                      - malware-protection-plan.guardduty.amazonaws.com
              - Sid: ManagedEntraOidcProvider
                Effect: Allow
                Action:
                  - iam:AddClientIDToOpenIDConnectProvider
                  - iam:CreateOpenIDConnectProvider
                  - iam:DeleteOpenIDConnectProvider
                  - iam:GetOpenIDConnectProvider
                  - iam:RemoveClientIDFromOpenIDConnectProvider
                  - iam:TagOpenIDConnectProvider
                  - iam:UntagOpenIDConnectProvider
                  - iam:UpdateOpenIDConnectProviderThumbprint
                Resource: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:oidc-provider/sts.windows.net/${EntraTenantId}/'
              - Sid: DiscoverOidcProviders
                Effect: Allow
                Action: iam:ListOpenIDConnectProviders
                Resource: '*'
              - Sid: GuardDutyServiceLinkedRole
                Effect: Allow
                Action: iam:CreateServiceLinkedRole
                Resource: '*'
                Condition:
                  StringEquals:
                    iam:AWSServiceName: guardduty.amazonaws.com
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName

  IdpCloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'loan-document-${EnvironmentName}-idp-cfn'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PinnedIdpProvisioning
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: PinnedUpstreamServiceSurface
                Effect: Allow
                Action:
                  - aoss:*
                  - application-autoscaling:*
                  - athena:*
                  - bedrock:*
                  - cloudwatch:*
                  - codebuild:*
                  - dynamodb:*
                  - ec2:*
                  - ecr:*
                  - events:*
                  - glue:*
                  - kms:*
                  - lambda:*
                  - logs:*
                  - s3:*
                  - sagemaker:*
                  - scheduler:*
                  - secretsmanager:*
                  - sns:*
                  - sqs:*
                  - ssm:*
                  - states:*
                  - textract:*
                  - xray:*
                Resource: '*'
              - Sid: PinnedIdpNestedStacks
                Effect: Allow
                Action: cloudformation:*
                Resource:
                  - !Sub 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${IdpStackName}-*/*'
                  - !Sub 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:changeSet/*/*'
              - Sid: CloudFormationTemplateInspection
                Effect: Allow
                Action:
                  - cloudformation:GetTemplateSummary
                  - cloudformation:ValidateTemplate
                Resource: '*'
        - PolicyName: PinnedIdpIamProvisioning
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: CreateBoundaryConstrainedIdpRoles
                Effect: Allow
                Action: iam:CreateRole
                Resource: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${IdpStackName}*'
                Condition:
                  ArnEquals:
                    iam:PermissionsBoundary: !Ref IdpRolePermissionsBoundary
              - Sid: ManageIdpRoles
                Effect: Allow
                Action:
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:ListAttachedRolePolicies
                  - iam:ListRolePolicies
                  - iam:PutRolePolicy
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:UpdateAssumeRolePolicy
                  - iam:UpdateRole
                  - iam:UpdateRoleDescription
                Resource: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${IdpStackName}*'
              - Sid: ApplyIdpBoundary
                Effect: Allow
                Action: iam:PutRolePermissionsBoundary
                Resource: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${IdpStackName}*'
                Condition:
                  ArnEquals:
                    iam:PermissionsBoundary: !Ref IdpRolePermissionsBoundary
              - Sid: DenyIdpBoundaryRemoval
                Effect: Deny
                Action: iam:DeleteRolePermissionsBoundary
                Resource: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${IdpStackName}*'
              - Sid: AttachApprovedIdpManagedPolicies
                Effect: Allow
                Action:
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                Resource: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${IdpStackName}*'
                Condition:
                  ArnEquals:
                    iam:PolicyARN:
                      - !Sub 'arn:${AWS::Partition}:iam::aws:policy/AmazonSSMManagedInstanceCore'
                      - !Sub 'arn:${AWS::Partition}:iam::aws:policy/CloudWatchLogsFullAccess'
                      - !Sub 'arn:${AWS::Partition}:iam::aws:policy/service-role/AWSGlueServiceRole'
              - Sid: ManageIdpInstanceProfiles
                Effect: Allow
                Action:
                  - iam:AddRoleToInstanceProfile
                  - iam:CreateInstanceProfile
                  - iam:DeleteInstanceProfile
                  - iam:GetInstanceProfile
                  - iam:RemoveRoleFromInstanceProfile
                  - iam:TagInstanceProfile
                  - iam:UntagInstanceProfile
                Resource:
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:instance-profile/${IdpStackName}*'
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${IdpStackName}*'
              - Sid: PassIdpRolesToApprovedServices
                Effect: Allow
                Action: iam:PassRole
                Resource: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${IdpStackName}*'
                Condition:
                  StringEquals:
                    iam:PassedToService:
                      - bedrock.amazonaws.com
                      - bedrock-agentcore.amazonaws.com
                      - codebuild.amazonaws.com
                      - ec2.amazonaws.com
                      - events.amazonaws.com
                      - glue.amazonaws.com
                      - lambda.amazonaws.com
                      - sagemaker.amazonaws.com
                      - scheduler.amazonaws.com
                      - states.amazonaws.com
              - Sid: ApprovedIdpServiceLinkedRoles
                Effect: Allow
                Action: iam:CreateServiceLinkedRole
                Resource: '*'
                Condition:
                  StringLike:
                    iam:AWSServiceName:
                      - aoss.amazonaws.com
                      - autoscaling.amazonaws.com
                      - bedrock.amazonaws.com
                      - bedrock-agentcore.amazonaws.com
                      - elasticloadbalancing.amazonaws.com
                      - opensearchservice.amazonaws.com
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName

  GitHubDeploymentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'loan-document-${EnvironmentName}-github-deploy'
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateGitHubOidcProvider
                - !Ref GitHubOidcProvider
                - !Ref ExistingGitHubOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                token.actions.githubusercontent.com:sub: !Sub 'repo:${GitHubOwner}/${GitHubRepository}:environment:${GitHubEnvironment}'
      Policies:
        - PolicyName: DeployReviewedStacks
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: CreateReviewedStacks
                Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                Resource:
                  - !Sub 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${PlatformStackName}/*'
                  - !Sub 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${IdpStackName}/*'
                Condition:
                  ArnEquals:
                    cloudformation:RoleArn:
                      - !GetAtt PlatformCloudFormationExecutionRole.Arn
                      - !GetAtt IdpCloudFormationExecutionRole.Arn
              - Sid: CreateReviewedChangeSets
                Effect: Allow
                Action: cloudformation:CreateChangeSet
                Resource:
                  - !Sub 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${PlatformStackName}/*'
                  - !Sub 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${IdpStackName}/*'
                Condition:
                  ArnEquals:
                    cloudformation:RoleArn:
                      - !GetAtt PlatformCloudFormationExecutionRole.Arn
                      - !GetAtt IdpCloudFormationExecutionRole.Arn
                  StringLike:
                    cloudformation:ChangeSetName: 'awscli-cloudformation-package-deploy-*'
              - Sid: ReadReviewedStacks
                Effect: Allow
                Action:
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResource
                  - cloudformation:DescribeStackResources
                  - cloudformation:DescribeStacks
                  - cloudformation:GetTemplate
                  - cloudformation:GetStackPolicy
                  - cloudformation:ListChangeSets
                  - cloudformation:ListStackResources
                  - cloudformation:SetStackPolicy
                Resource:
                  - !Sub 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${PlatformStackName}/*'
                  - !Sub 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${IdpStackName}/*'
              - Sid: ExecuteReviewedChangeSets
                Effect: Allow
                Action:
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                Resource: !Sub 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:changeSet/awscli-cloudformation-package-deploy-*/*'
              - Sid: InspectTemplates
                Effect: Allow
                Action:
                  - cloudformation:GetTemplateSummary
                  - cloudformation:ValidateTemplate
                Resource: '*'
              - Sid: PassSplitExecutionRolesOnly
                Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !GetAtt PlatformCloudFormationExecutionRole.Arn
                  - !GetAtt IdpCloudFormationExecutionRole.Arn
                Condition:
                  StringEquals:
                    iam:PassedToService: cloudformation.amazonaws.com
              - Sid: ArtifactBucketList
                Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource: !GetAtt ArtifactBucket.Arn
              - Sid: ArtifactObjects
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                Resource: !Sub '${ArtifactBucket.Arn}/*'
              - Sid: ArtifactEncryption
                Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:DescribeKey
                  - kms:Encrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt ArtifactKey.Arn
              - Sid: SyncIdpConfiguration
                Effect: Allow
                Action:
                  - dynamodb:DescribeTable
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Scan
                  - dynamodb:UpdateItem
                Resource: !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${IdpStackName}-ConfigurationTable-*'
              - Sid: DeploymentIdentity
                Effect: Allow
                Action: sts:GetCallerIdentity
                Resource: '*'
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName

Outputs:
  GitHubOidcProviderArn:
    Value: !If
      - CreateGitHubOidcProvider
      - !Ref GitHubOidcProvider
      - !Ref ExistingGitHubOidcProviderArn
  GitHubDeploymentRoleArn:
    Value: !GetAtt GitHubDeploymentRole.Arn
  PlatformCloudFormationExecutionRoleArn:
    Value: !GetAtt PlatformCloudFormationExecutionRole.Arn
  IdpCloudFormationExecutionRoleArn:
    Value: !GetAtt IdpCloudFormationExecutionRole.Arn
  PlatformRolePermissionsBoundaryArn:
    Value: !Ref PlatformRolePermissionsBoundary
  IdpRolePermissionsBoundaryArn:
    Value: !Ref IdpRolePermissionsBoundary
  ArtifactBucketName:
    Value: !Ref ArtifactBucket
  ArtifactKeyArn:
    Value: !GetAtt ArtifactKey.Arn
