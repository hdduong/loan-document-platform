AWSTemplateFormatVersion: '2010-09-09'
Description: GitHub Actions OIDC trust, deployment artifact storage, and CloudFormation delivery roles.

Parameters:
  GitHubOwner:
    Type: String
    AllowedPattern: '[A-Za-z0-9_.-]+'
  GitHubRepository:
    Type: String
    AllowedPattern: '[A-Za-z0-9_.-]+'
  GitHubEnvironment:
    Type: String
    Default: prod
    AllowedPattern: '[A-Za-z0-9_.-]+'
  ExistingGitHubOidcProviderArn:
    Type: String
    Default: ''
  EnvironmentName:
    Type: String
    Default: prod
    AllowedPattern: '[a-z0-9-]+'
  IdpStackName:
    Type: String
    AllowedPattern: '[A-Za-z][-A-Za-z0-9]*'
  Route53HostedZoneId:
    Type: String

Conditions:
  CreateGitHubOidcProvider: !Equals [!Ref ExistingGitHubOidcProviderArn, '']

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateGitHubOidcProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: ManagedBy
          Value: CloudFormation

  ArtifactKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: !Sub 'loan-document-platform ${EnvironmentName} CI artifact encryption'
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableAccountAdministration
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName

  ArtifactKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/loan-document-${EnvironmentName}-ci-artifacts'
      TargetKeyId: !Ref ArtifactKey

  ArtifactBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub 'loan-document-${EnvironmentName}-ci-artifacts-${AWS::AccountId}-${AWS::Region}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - BucketKeyEnabled: true
            ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt ArtifactKey.Arn
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
          - Id: RetireOldBuilds
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30
            ExpirationInDays: 90
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: DataClassification
          Value: build-artifacts-no-document-data

  ArtifactBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ArtifactBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt ArtifactBucket.Arn
              - !Sub '${ArtifactBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'loan-document-${EnvironmentName}-cfn-execution'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LoanDocumentInfrastructure
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: PlatformServices
                Effect: Allow
                Action:
                  - acm:*
                  - athena:*
                  - apigateway:*
                  - application-autoscaling:*
                  - backup:*
                  - bedrock:*
                  - budgets:*
                  - cloudformation:*
                  - cloudfront:*
                  - cloudwatch:*
                  - dynamodb:*
                  - ecr:*
                  - events:*
                  - guardduty:*
                  - glue:*
                  - kms:*
                  - lambda:*
                  - logs:*
                  - s3:*
                  - sns:*
                  - sqs:*
                  - ssm:*
                  - states:*
                  - wafv2:*
                  - xray:*
                Resource: '*'
              - Sid: HostedZoneChanges
                Effect: Allow
                Action:
                  - route53:ChangeResourceRecordSets
                  - route53:GetHostedZone
                  - route53:ListResourceRecordSets
                Resource: !Sub 'arn:${AWS::Partition}:route53:::hostedzone/${Route53HostedZoneId}'
              - Sid: Route53Discovery
                Effect: Allow
                Action:
                  - route53:GetChange
                  - route53:ListHostedZones
                Resource: '*'
              - Sid: ManagedApplicationRoles
                Effect: Allow
                Action:
                  - iam:AttachRolePolicy
                  - iam:CreatePolicy
                  - iam:CreatePolicyVersion
                  - iam:CreateRole
                  - iam:DeletePolicy
                  - iam:DeletePolicyVersion
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:DetachRolePolicy
                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:ListAttachedRolePolicies
                  - iam:ListPolicyVersions
                  - iam:ListRolePolicies
                  - iam:PassRole
                  - iam:PutRolePolicy
                  - iam:SetDefaultPolicyVersion
                  - iam:TagPolicy
                  - iam:TagRole
                  - iam:UntagPolicy
                  - iam:UntagRole
                  - iam:UpdateAssumeRolePolicy
                  - iam:UpdateRole
                  - iam:UpdateRoleDescription
                Resource:
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/loan-document-*'
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/loan-idp-*'
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:policy/loan-document-*'
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:policy/loan-idp-*'
              - Sid: ServiceLinkedRoles
                Effect: Allow
                Action: iam:CreateServiceLinkedRole
                Resource: '*'
                Condition:
                  StringLike:
                    iam:AWSServiceName:
                      - guardduty.amazonaws.com
                      - wafv2.amazonaws.com
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName

  GitHubDeploymentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'loan-document-${EnvironmentName}-github-deploy'
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateGitHubOidcProvider
                - !Ref GitHubOidcProvider
                - !Ref ExistingGitHubOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                token.actions.githubusercontent.com:sub: !Sub 'repo:${GitHubOwner}/${GitHubRepository}:environment:${GitHubEnvironment}'
      Policies:
        - PolicyName: DeployReviewedStacks
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: CloudFormationDelivery
                Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:CreateStack
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResource
                  - cloudformation:DescribeStackResources
                  - cloudformation:DescribeStacks
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:GetTemplate
                  - cloudformation:GetTemplateSummary
                  - cloudformation:ListChangeSets
                  - cloudformation:ListStackResources
                  - cloudformation:UpdateStack
                  - cloudformation:ValidateTemplate
                Resource: '*'
              - Sid: PassExecutionRoleOnly
                Effect: Allow
                Action: iam:PassRole
                Resource: !GetAtt CloudFormationExecutionRole.Arn
                Condition:
                  StringEquals:
                    iam:PassedToService: cloudformation.amazonaws.com
              - Sid: ArtifactBucketList
                Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource: !GetAtt ArtifactBucket.Arn
              - Sid: ArtifactObjects
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                Resource: !Sub '${ArtifactBucket.Arn}/*'
              - Sid: ArtifactEncryption
                Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:DescribeKey
                  - kms:Encrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt ArtifactKey.Arn
              - Sid: SyncIdpConfiguration
                Effect: Allow
                Action:
                  - dynamodb:DescribeTable
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Scan
                  - dynamodb:UpdateItem
                Resource: !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${IdpStackName}-ConfigurationTable-*'
              - Sid: DeploymentIdentity
                Effect: Allow
                Action: sts:GetCallerIdentity
                Resource: '*'
              - Sid: AssumeUiDeploymentRole
                Effect: Allow
                Action: sts:AssumeRole
                Resource: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/loan-document-${EnvironmentName}-ui-deploy'
      Tags:
        - Key: Application
          Value: loan-document-platform
        - Key: Environment
          Value: !Ref EnvironmentName

Outputs:
  GitHubOidcProviderArn:
    Value: !If
      - CreateGitHubOidcProvider
      - !Ref GitHubOidcProvider
      - !Ref ExistingGitHubOidcProviderArn
  GitHubDeploymentRoleArn:
    Value: !GetAtt GitHubDeploymentRole.Arn
  CloudFormationExecutionRoleArn:
    Value: !GetAtt CloudFormationExecutionRole.Arn
  ArtifactBucketName:
    Value: !Ref ArtifactBucket
  ArtifactKeyArn:
    Value: !GetAtt ArtifactKey.Arn
