name: Validate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Validate pinned configurations
        run: python scripts/validate-repository.py

      - name: Compile Python
        run: python -m compileall -q services scripts

      - name: Lint Python
        run: ruff check services scripts tests

      - name: Run unit tests
        run: pytest -q

      - name: Validate OpenAPI
        run: openapi-spec-validator contracts/openapi/loan-api.yaml

      - name: Lint CloudFormation
        run: cfn-lint 'infra/**/*.yaml'

      - name: Set up Node
        if: ${{ hashFiles('apps/web/package.json') != '' }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Validate React application
        if: ${{ hashFiles('apps/web/package.json') != '' }}
        working-directory: apps/web
        run: |
          npm ci
          npm run lint
          npm test -- --run
          npm run build
