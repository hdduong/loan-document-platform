name: Validate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Validate pinned configurations
        run: python scripts/validate-repository.py

      - name: Validate PowerShell syntax
        shell: pwsh
        run: ./scripts/test-powershell-syntax.ps1

      - name: Compile Python
        run: python -m compileall -q services scripts

      - name: Lint Python
        run: ruff check services scripts tests

      - name: Run Python tests with coverage
        run: |
          pytest -q --cov=services --cov-branch --cov-report=term-missing --cov-report=json:coverage.json
          python scripts/check-python-coverage.py coverage.json

      - name: Validate OpenAPI
        run: openapi-spec-validator contracts/openapi/loan-api.yaml

      - name: Lint CloudFormation
        run: cfn-lint 'infra/**/*.yaml'

      - name: Compile Azure Bicep
        run: az bicep build --file infra/azure/main.bicep --stdout > /dev/null

      - name: Build secretless non-root API container
        run: |
          docker build --file services/azure_api/Dockerfile --tag loan-document-api:validation .
          test "$(docker image inspect --format '{{.Config.User}}' loan-document-api:validation)" = '10001:10001'

      - name: Install pinned Trivy scanner
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          version: v0.72.0
          cache: true

      - name: Scan exact validation image and generate SBOM
        run: |
          trivy image --scanners vuln --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 --timeout 10m --no-progress loan-document-api:validation
          trivy image --format cyclonedx --output /tmp/loan-document-api.cdx.json --timeout 10m --no-progress loan-document-api:validation
          test -s /tmp/loan-document-api.cdx.json

      - name: Set up Node
        if: ${{ hashFiles('apps/web/package.json') != '' }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Validate React application
        if: ${{ hashFiles('apps/web/package.json') != '' }}
        working-directory: apps/web
        run: |
          npm ci
          npm audit --audit-level=high
          npx playwright install --with-deps chromium
          npm run lint
          npm run typecheck
          npm run test:coverage
          npm run build
          npm run test:e2e:ci
