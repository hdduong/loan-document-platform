name: Deploy production

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type DEPLOY PROD exactly
        required: true
        type: string
      skip_idp:
        description: Skip pinned headless IDP deployment/config synchronization
        required: true
        default: false
        type: boolean
      skip_edge:
        description: Skip CloudFront, WAF, certificates, and DNS
        required: true
        default: false
        type: boolean
      skip_web:
        description: Skip React deployment (leave enabled until Claude UI is ready)
        required: true
        default: true
        type: boolean
      skip_ui_tests:
        description: Skip UI tests before web deployment
        required: true
        default: false
        type: boolean
      reinstall_idp_cli:
        description: Reinstall the pinned IDP CLI tooling
        required: true
        default: false
        type: boolean
      clean_idp_build:
        description: Rebuild the pinned IDP source workspace from scratch
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: loan-document-production
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy-production
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: prod
    env:
      SKIP_IDP: ${{ inputs.skip_idp }}
      SKIP_EDGE: ${{ inputs.skip_edge }}
      SKIP_WEB: ${{ inputs.skip_web }}
      SKIP_UI_TESTS: ${{ inputs.skip_ui_tests }}
      REINSTALL_IDP_CLI: ${{ inputs.reinstall_idp_cli }}
      CLEAN_IDP_BUILD: ${{ inputs.clean_idp_build }}
      DEPLOY_CONFIRMATION: ${{ inputs.confirmation }}
    steps:
      - name: Verify deployment intent
        shell: pwsh
        run: |
          if ($env:DEPLOY_CONFIRMATION -cne 'DEPLOY PROD') {
            throw 'Production confirmation did not match DEPLOY PROD.'
          }
          if ($env:GITHUB_REF -cne 'refs/heads/main') {
            throw "Production may be deployed only from main; received $env:GITHUB_REF."
          }

      - name: Check out reviewed source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@f84ec7d548307efafe33230528756de3c5841a17 # v2
        with:
          version: '1.163.0'

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Revalidate release input
        shell: pwsh
        run: |
          python scripts/validate-repository.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python -m compileall -q services scripts
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ruff check services scripts tests
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          pytest -q
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          openapi-spec-validator contracts/openapi/loan-api.yaml
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Get-ChildItem -Path infra -Recurse -Filter *.yaml | ForEach-Object {
            cfn-lint $_.FullName
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Materialize protected deployment configuration
        id: config
        shell: pwsh
        env:
          DEPLOYMENT_CONFIG_JSON: ${{ vars.DEPLOYMENT_CONFIG_JSON }}
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          ENTRA_API_CLIENT_ID: ${{ vars.ENTRA_API_CLIENT_ID }}
          ENTRA_SPA_CLIENT_ID: ${{ vars.ENTRA_SPA_CLIENT_ID }}
          LOAN_API_ORIGIN_VERIFY_SECRET: ${{ secrets.LOAN_API_ORIGIN_VERIFY_SECRET }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:DEPLOYMENT_CONFIG_JSON)) {
            throw 'Missing protected environment variable DEPLOYMENT_CONFIG_JSON.'
          }
          if ([string]::IsNullOrWhiteSpace($env:AWS_ACCOUNT_ID)) {
            throw 'Missing protected environment variable AWS_ACCOUNT_ID.'
          }
          if ([string]::IsNullOrWhiteSpace($env:ENTRA_API_CLIENT_ID) -or
              [string]::IsNullOrWhiteSpace($env:ENTRA_SPA_CLIENT_ID)) {
            throw 'Missing Entra API or SPA application ID. Run scripts/sync-github-entra.ps1.'
          }
          if ([string]::IsNullOrWhiteSpace($env:LOAN_API_ORIGIN_VERIFY_SECRET) -or
              $env:LOAN_API_ORIGIN_VERIFY_SECRET.Length -lt 32) {
            throw 'Missing or invalid protected origin-verification secret.'
          }

          $config = $env:DEPLOYMENT_CONFIG_JSON | ConvertFrom-Json -Depth 20
          if ($config.environment -cne 'prod') { throw 'The production workflow received a non-production configuration.' }
          if ($config.awsAccountId -cne $env:AWS_ACCOUNT_ID) { throw 'AWS account variables disagree.' }
          $directory = Join-Path $env:GITHUB_WORKSPACE '.local'
          [System.IO.Directory]::CreateDirectory($directory) | Out-Null
          $path = Join-Path $directory 'ci-prod.json'
          [System.IO.File]::WriteAllText($path, $env:DEPLOYMENT_CONFIG_JSON, [System.Text.UTF8Encoding]::new($false))
          "DEPLOYMENT_CONFIG_PATH=$path" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure short-lived AWS credentials
        uses: aws-actions/configure-aws-credentials@cabfdba3510de1431bac9dba27511d97497fc100 # v5
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          allowed-account-ids: ${{ vars.AWS_ACCOUNT_ID }}
          role-session-name: loan-document-${{ github.run_id }}
          role-duration-seconds: 3600
          mask-aws-account-id: true
          unset-current-credentials: true

      - name: Verify AWS identity
        run: aws sts get-caller-identity --no-cli-pager

      - name: Deploy reviewed production stacks
        shell: pwsh
        env:
          ENTRA_API_CLIENT_ID: ${{ vars.ENTRA_API_CLIENT_ID }}
          ENTRA_SPA_CLIENT_ID: ${{ vars.ENTRA_SPA_CLIENT_ID }}
          ENTRA_SERVICE_CLIENT_ID: ${{ vars.ENTRA_SERVICE_CLIENT_ID }}
          LOAN_API_ORIGIN_VERIFY_SECRET: ${{ secrets.LOAN_API_ORIGIN_VERIFY_SECRET }}
        run: |
          $originSecret = ConvertTo-SecureString $env:LOAN_API_ORIGIN_VERIFY_SECRET -AsPlainText -Force
          $parameters = @{
            EnvironmentFile = $env:DEPLOYMENT_CONFIG_PATH
            OriginVerifySecret = $originSecret
            SkipEntra = $true
            SkipIdp = ($env:SKIP_IDP -ceq 'true')
            SkipEdge = ($env:SKIP_EDGE -ceq 'true')
            SkipWeb = ($env:SKIP_WEB -ceq 'true')
            SkipUiTests = ($env:SKIP_UI_TESTS -ceq 'true')
            ReinstallIdpCli = ($env:REINSTALL_IDP_CLI -ceq 'true')
            CleanIdpBuild = ($env:CLEAN_IDP_BUILD -ceq 'true')
          }
          & ./scripts/deploy-all.ps1 @parameters
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
